        .code-loader-text {
            display: inline-block;
            width: 0;
            overflow: hidden;
            white-space: nowrap;
            animation: typing 1.2s steps(11, end) forwards;
        }

        .code-loader-cursor {
            display: inline-block;
            width: 1ch;
            overflow: hidden;
            opacity: 0;
            animation: show-cursor 0s linear 1.2s forwards, cursor-blink 0.92s steps(1, end) 1.2s infinite;
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 11ch;
            }
        }

        @keyframes show-cursor {
            from {
                opacity: 1;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes cursor-blink {

            0%,
            49% {

            }

            100% {
                opacity: 0;
            }
        }

    <script>
        function hideInitialSplash() {
            var splash = document.getElementById('initial-splash');
            if (!splash || splash.classList.contains('hidden')) {
                return;
            }

            splash.classList.add('hidden');

            if (splash.parentNode) {
                splash.parentNode.removeChild(splash);
            }
        }

        window.addEventListener('flutter-first-frame', hideInitialSplash, {
            once: true
        });

        // Event-only fallback with no artificial timer delay.
        window.addEventListener('load', hideInitialSplash, {
            once: true
        });
    </script>
